<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Costos x Km MVP</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <h1><a href="{{ url_for('index') }}">Costos x Km · Version Preliminar</a></h1>
      <div class="sub">Primer versión para pruebas con MySQL</div>
    </div>
  </header>
  <main class="wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
