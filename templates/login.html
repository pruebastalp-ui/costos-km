{% extends "base.html" %}
{% block content %}

<style>
  .login-wrap {
    max-width: 420px;
    margin: 60px auto;
  }

  .login-card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
  }

  .login-card h2 {
    margin-top: 0;
    margin-bottom: 8px;
  }

  .login-card p {
    color: #666;
    margin-bottom: 20px;
  }

  .form-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 14px;
  }

  .form-row label {
    font-weight: 600;
  }

  .form-row input {
    padding: 10px 12px;
    border: 1px solid #bbb;
    border-radius: 8px;
    font-size: 14px;
  }

  .login-btn {
    width: 100%;
    padding: 10px 12px;
    border: 0;
    border-radius: 8px;
    background: #0d6efd;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }

  .login-btn:hover {
    filter: brightness(0.98);
  }
</style>

<div class="login-wrap">
  <div class="login-card">
    <h2>Ingreso al sistema</h2>
    <p>Ingresá usuario y contraseña para acceder.</p>

    <form method="post">
      <div class="form-row">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" required autofocus>
      </div>

      <div class="form-row">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required>
      </div>

      <button type="submit" class="login-btn">Ingresar</button>
    </form>
  </div>
</div>

{% endblock %}
